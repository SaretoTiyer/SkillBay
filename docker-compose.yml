# ============================================================
# SkillBay - Docker Compose (Development & Production)
# ============================================================
# Usage:
#   Development:  docker compose up -d
#   Production:   docker compose -f docker-compose.yml up -d --build
#   Stop:         docker compose down
#   Clean:        docker compose down -v (removes volumes too)
# ============================================================

services:
  # ----------------------------------------------------------
  # Backend: Laravel API (PHP-FPM + Nginx + Queue Worker)
  # ----------------------------------------------------------
  backend:
    build:
      context: ./skillbay-backend
      dockerfile: Dockerfile
      args:
        - APP_ENV=${APP_ENV:-local}
        - APP_DEBUG=${APP_DEBUG:-true}
    container_name: skillbay-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:80"
    environment:
      APP_NAME: "${APP_NAME:-SkillBay}"
      APP_ENV: "${APP_ENV:-local}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: "${DB_CONNECTION:-mysql}"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-skillbay}"
      DB_USERNAME: "${DB_USERNAME:-skillbay}"
      DB_PASSWORD: "${DB_PASSWORD:-skillbay_secret}"
      CACHE_STORE: "${CACHE_STORE:-database}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
      SESSION_DRIVER: "${SESSION_DRIVER:-database}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: "${MAIL_MAILER:-smtp}"
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
      MAIL_FROM_ADDRESS: "no-reply@skillbay.co"
      MAIL_FROM_NAME: "${APP_NAME:-SkillBay}"
      SANCTUM_STATEFUL_DOMAINS: "${SANCTUM_STATEFUL_DOMAINS:-localhost:5173}"
      SESSION_DOMAIN: "${SESSION_DOMAIN:-.localhost}"
    volumes:
      # Persistent storage for uploaded files
      - backend-storage:/var/www/html/storage/app
      # Persistent storage for logs
      - backend-logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillbay-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ----------------------------------------------------------
  # Frontend: React SPA (Nginx static)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./skillbay-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
    container_name: skillbay-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - skillbay-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ----------------------------------------------------------
  # Database: MySQL 8.0
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: skillbay-db
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-skillbay}"
      MYSQL_USER: "${DB_USERNAME:-skillbay}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-skillbay_secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_secret}"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - skillbay-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # Mailpit: Email testing server with web UI (development)
  # Access UI at: http://127.0.0.1:8025
  # ----------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: skillbay-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - skillbay-network

  # ----------------------------------------------------------
  # Redis: Cache & optional queue driver
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: skillbay-redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - skillbay-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

# ----------------------------------------------------------
# Volumes
# ----------------------------------------------------------
volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
  backend-storage:
    driver: local
  backend-logs:
    driver: local

# ----------------------------------------------------------
# Networks
# ----------------------------------------------------------
networks:
  skillbay-network:
    driver: bridge
